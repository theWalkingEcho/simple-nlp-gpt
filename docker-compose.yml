version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DEBUG=True
      - PYTHONUNBUFFERED=1
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app
    command: python main.py

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://backend:5000/api/v1
    env_file:
      - frontend/.env.local
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
